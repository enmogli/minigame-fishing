<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>海風釣魚 - 終極穩定版</title>
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 載入 React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- 載入 Babel 供瀏覽器即時編譯 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-900 text-white overflow-hidden m-0 p-0">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // --- 音效引擎 (Web Audio API) ---
    const SoundEngine = {
      ctx: null, reelOsc: null, reelGain: null, bgmTimer: null, bgmPlaying: false,
      init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this.ctx.state === 'suspended') this.ctx.resume();
      },
      playBGM() {
        if (!this.ctx || this.bgmPlaying) return;
        this.bgmPlaying = true;
        let nextNoteTime = this.ctx.currentTime + 0.1;
        let step = 0;
        const chords = [[261.63, 329.63, 392.00, 493.88], [220.00, 261.63, 329.63, 440.00], [174.61, 261.63, 329.63, 349.23], [196.00, 246.94, 293.66, 349.23]];
        const schedule = () => {
          if (!this.bgmPlaying) return;
          while (nextNoteTime < this.ctx.currentTime + 0.1) {
            const chordIdx = Math.floor(step / 8) % chords.length;
            const noteIdx = step % 4; 
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sine'; osc.frequency.value = chords[chordIdx][noteIdx];
            osc.connect(gain); gain.connect(this.ctx.destination);
            gain.gain.setValueAtTime(0, nextNoteTime);
            gain.gain.linearRampToValueAtTime(0.12, nextNoteTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, nextNoteTime + 1.2);
            osc.start(nextNoteTime); osc.stop(nextNoteTime + 1.5);
            nextNoteTime += 0.35; step++;
          }
          this.bgmTimer = setTimeout(schedule, 100);
        };
        schedule();
      },
      stopBGM() { this.bgmPlaying = false; clearTimeout(this.bgmTimer); },
      playFail() { if (!this.ctx) return; const o=this.ctx.createOscillator(),g=this.ctx.createGain(); o.connect(g); g.connect(this.ctx.destination); o.type='sawtooth'; o.frequency.setValueAtTime(250,this.ctx.currentTime); o.frequency.exponentialRampToValueAtTime(50,this.ctx.currentTime+0.6); g.gain.setValueAtTime(0.3,this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01,this.ctx.currentTime+0.6); o.start(); o.stop(this.ctx.currentTime+0.6); },
      playSit() { if (!this.ctx) return; const o=this.ctx.createOscillator(),g=this.ctx.createGain(); o.connect(g); g.connect(this.ctx.destination); o.type='square'; o.frequency.setValueAtTime(300,this.ctx.currentTime); g.gain.setValueAtTime(0.15,this.ctx.currentTime); o.start(); o.stop(this.ctx.currentTime+0.3); },
      playStand() { if (!this.ctx) return; const o=this.ctx.createOscillator(),g=this.ctx.createGain(); o.connect(g); g.connect(this.ctx.destination); o.type='square'; o.frequency.setValueAtTime(80,this.ctx.currentTime); g.gain.setValueAtTime(0.15,this.ctx.currentTime); o.start(); o.stop(this.ctx.currentTime+0.3); },
      playCast() { if(!this.ctx) return; const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.connect(g); g.connect(this.ctx.destination); o.type='sine'; o.frequency.setValueAtTime(600,this.ctx.currentTime); g.gain.setValueAtTime(0,this.ctx.currentTime); g.gain.linearRampToValueAtTime(0.5,this.ctx.currentTime+0.1); o.start(); o.stop(this.ctx.currentTime+0.5); },
      playNibble() { if(!this.ctx) return; const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.connect(g); g.connect(this.ctx.destination); o.type='sine'; o.frequency.setValueAtTime(400,this.ctx.currentTime); g.gain.setValueAtTime(0.4,this.ctx.currentTime); o.start(); o.stop(this.ctx.currentTime+0.1); },
      playBite() { if(!this.ctx) return; const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.connect(g); g.connect(this.ctx.destination); o.type='triangle'; o.frequency.setValueAtTime(1200,this.ctx.currentTime); g.gain.setValueAtTime(0.8,this.ctx.currentTime); o.start(); o.stop(this.ctx.currentTime+0.3); },
      playHit() { if(!this.ctx) return; const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.connect(g); g.connect(this.ctx.destination); o.type='square'; o.frequency.setValueAtTime(300,this.ctx.currentTime); g.gain.setValueAtTime(0.6,this.ctx.currentTime); o.start(); o.stop(this.ctx.currentTime+0.4); },
      startReeling() { if(!this.ctx||this.reelOsc) return; this.reelOsc=this.ctx.createOscillator(); this.reelGain=this.ctx.createGain(); this.reelOsc.type='square'; this.reelOsc.frequency.value=25; this.reelGain.gain.value=0.3; this.reelOsc.connect(this.reelGain); this.reelGain.connect(this.ctx.destination); this.reelOsc.start(); },
      stopReeling() { if(this.reelOsc){ this.reelOsc.stop(); this.reelOsc.disconnect(); this.reelOsc=null; } },
      playVictory() { if(!this.ctx) return; const n=[523.25,659.25,783.99,1046.50]; n.forEach((f,i)=>{ const o=this.ctx.createOscillator(),g=this.ctx.createGain(); o.connect(g); g.connect(this.ctx.destination); o.type='square'; o.frequency.value=f; const st=this.ctx.currentTime+(i*0.08); g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(0.2,st+0.02); o.start(st); o.stop(st+0.4); }); },
      playTally() { if(!this.ctx) return; const o=this.ctx.createOscillator(),g=this.ctx.createGain(); o.connect(g); g.connect(this.ctx.destination); o.type='sine'; o.frequency.setValueAtTime(1000,this.ctx.currentTime); g.gain.setValueAtTime(0.2,this.ctx.currentTime); o.start(); o.stop(this.ctx.currentTime+0.05); },
      playGrandTotal() { if(!this.ctx) return; const n=[261.63,329.63,392.00,523.25]; n.forEach((f)=>{ const o=this.ctx.createOscillator(),g=this.ctx.createGain(); o.connect(g); g.connect(this.ctx.destination); o.type='triangle'; o.frequency.value=f; g.gain.setValueAtTime(0,this.ctx.currentTime); g.gain.linearRampToValueAtTime(0.3,this.ctx.currentTime+0.1); o.start(); o.stop(this.ctx.currentTime+1.5); }); },
      playEndingBGM() { if (!this.ctx) return; this.stopBGM(); this.bgmPlaying = true; let nextNoteTime = this.ctx.currentTime + 0.1; let step = 0; const chords = [[174.61, 261.63, 329.63, 440.00], [130.81, 261.63, 329.63, 392.00], [146.83, 293.66, 349.23, 440.00]]; const schedule = () => { if (!this.bgmPlaying || step >= 24) { this.bgmPlaying = false; return; } while (nextNoteTime < this.ctx.currentTime + 0.1 && step < 24) { const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = 'sine'; osc.frequency.value = chords[Math.floor(step/8)%3][step%4]; osc.connect(gain); gain.connect(this.ctx.destination); gain.gain.setValueAtTime(0, nextNoteTime); gain.gain.linearRampToValueAtTime(0.15, nextNoteTime + 0.2); osc.start(nextNoteTime); osc.stop(nextNoteTime + 3.0); nextNoteTime += 0.45; step++; } this.bgmTimer = setTimeout(schedule, 100); }; schedule(); }
    };

    // --- 魚類數據 (日夜區分) ---
    const FISH_DATABASE = [
      { name: "破舊的靴子", icon: "🥾", rarity: "trash", color: "text-gray-400", minLen: 20, maxLen: 30, minPrice: 0, maxPrice: 1, chance: 5, baseDiff: 1, time: "both" },
      { name: "海瓜子", icon: "🐚", rarity: "common", color: "text-white", minLen: 2, maxLen: 5, minPrice: 5, maxPrice: 10, chance: 15, baseDiff: 1, time: "day" },
      { name: "雀鯛", icon: "🐟", rarity: "common", color: "text-white", minLen: 5, maxLen: 15, minPrice: 10, maxPrice: 20, chance: 15, baseDiff: 2, time: "day" },
      { name: "魷魚", icon: "🦑", rarity: "common", color: "text-white", minLen: 15, maxLen: 40, minPrice: 20, maxPrice: 50, chance: 20, baseDiff: 2, time: "night" },
      { name: "白帶魚", icon: "🐟", rarity: "uncommon", color: "text-green-400", minLen: 60, maxLen: 150, minPrice: 70, maxPrice: 140, chance: 12, baseDiff: 4, time: "night" },
      { name: "紅槽", icon: "🐟", rarity: "rare", color: "text-blue-400", minLen: 35, maxLen: 60, minPrice: 180, maxPrice: 350, chance: 8, baseDiff: 5, time: "day" },
      { name: "鮭魚", icon: "🐟", rarity: "epic", color: "text-purple-400", minLen: 50, maxLen: 100, minPrice: 800, maxPrice: 1500, chance: 3, baseDiff: 8, time: "day" },
      { name: "石斑", icon: "🐟", rarity: "epic", color: "text-purple-400", minLen: 60, maxLen: 120, minPrice: 1000, maxPrice: 2000, chance: 3, baseDiff: 8, time: "both" },
      { name: "燈籠魚", icon: "🐟", rarity: "epic", color: "text-purple-400", minLen: 20, maxLen: 45, minPrice: 900, maxPrice: 1800, chance: 3, baseDiff: 8, time: "night" },
      { name: "傳說黃金石斑", icon: "👑", rarity: "legendary", color: "text-yellow-400", minLen: 100, maxLen: 200, minPrice: 5000, maxPrice: 10000, chance: 1, baseDiff: 10, time: "day" }
    ];

    const generateFish = (gameTime) => {
      const isNight = gameTime < 360 || gameTime > 1080; 
      const availableFish = FISH_DATABASE.filter(f => f.time === "both" || (isNight ? f.time === "night" : f.time === "day"));
      const totalChance = availableFish.reduce((acc, f) => acc + f.chance, 0);
      let rand = Math.random() * totalChance;
      let selectedFish = availableFish[0];
      for (let fish of availableFish) { if (rand <= fish.chance) { selectedFish = fish; break; } rand -= fish.chance; }
      const length = Math.floor(Math.random() * (selectedFish.maxLen - selectedFish.minLen + 1)) + selectedFish.minLen;
      const price = Math.floor(Math.random() * (selectedFish.maxPrice - selectedFish.minPrice + 1)) + selectedFish.minPrice;
      return { ...selectedFish, length, price, id: Date.now() + Math.random(), difficulty: selectedFish.baseDiff + ((length - selectedFish.minLen) / (selectedFish.maxLen - selectedFish.minLen || 1)) * 2 };
    };

    // --- 結局畫面組件 ---
    const EndingScreen = ({ totalEarned }) => {
      useEffect(() => { SoundEngine.init(); SoundEngine.playEndingBGM(); return () => SoundEngine.stopBGM(); }, []);
      const isHappy = totalEarned > 0;
      return (
        <div className="absolute inset-0 bg-black overflow-hidden z-50 flex items-center justify-center anim-iris-out">
          {/* 背景漸層遮罩: 確保全局夕陽光輝 */}
          <div className="absolute inset-0 z-0 bg-gradient-to-t from-[#ea580c] via-[#9a3412] to-[#7c2d12]" />
          <div className="absolute inset-0 z-0 bg-[radial-gradient(circle_at_480px_350px,rgba(253,224,71,0.5)_0%,transparent_60%)]" />

          <svg viewBox="0 0 800 500" preserveAspectRatio="xMidYMax slice" className="absolute inset-0 w-full h-full pointer-events-none z-10">
            {/* 太陽微角 */}
            <circle cx="475" cy="335" r="40" fill="#fef08a" opacity="0.9" />
            {/* 暖色調山脈 */}
            <path d="M 0 380 L 120 220 L 260 280 L 400 320 L 540 260 L 720 180 L 880 290 L 1000 230 L 1000 380 Z" fill="#4a1504" />
            {/* 溫暖發光的地面與小路 */}
            <rect y="380" width="1000" height="120" fill="#9a3412" />
            <polygon points="390,380 410,380 650,500 150,500" fill="#f59e0b" opacity="0.7" />
            
            {/* 卷軸橫線捲動特效 */}
            <g className="anim-road-scroll">
              <line x1="395" y1="380" x2="395" y2="500" stroke="#7c2d12" strokeWidth="1" opacity="0.4" />
              <line x1="405" y1="380" x2="405" y2="500" stroke="#7c2d12" strokeWidth="1" opacity="0.4" />
              {/* 橫線由上往下飛來 */}
              <line x1="0" y1="380" x2="1000" y2="380" stroke="#7c2d12" strokeWidth="2" className="anim-line-move" />
            </g>

            {/* 漁夫背影 */}
            <g className="anim-walk-away">
              <g className="anim-bob">
                <ellipse cx="0" cy="0" rx="20" ry="3" fill="black" opacity="0.4" />
                <rect x="-12" y="-20" width="8" height="20" rx="4" fill="#111" className="anim-leg-walk" />
                <rect x="4" y="-20" width="8" height="20" rx="4" fill="#111" className="anim-leg-walk-reverse" />
                <g transform={isHappy ? "" : "rotate(15, 0, -45)"}>
                  <rect x="-15" y="-55" width="30" height="35" rx="8" fill="#111" />
                  <circle cx="0" cy="-65" r="14" fill="#111" />
                  <line x1="-22" y1="-25" x2="-80" y2="-130" stroke="#111" strokeWidth="4" />
                </g>
              </g>
            </g>
          </svg>
          <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-30 opacity-0 anim-text-fade">
             <h1 className="text-white text-3xl md:text-5xl font-black tracking-widest drop-shadow-lg">下次再來釣魚吧！</h1>
          </div>
        </div>
      );
    };

    // --- 釣魚遊戲元件 ---
    const FishingMiniGame = ({ fish, difficultySettings, weather, onWin, onLose }) => {
      const isSimple = difficultySettings === 'simple';
      const diff = fish.difficulty;
      const weatherSpeedMult = weather === 'rainy' ? 1.3 : 1;
      const BAR_HEIGHT = Math.max(12, (30 - diff * 1.5) * (isSimple ? 1.25 : 1)); 
      const INITIAL_PROGRESS = (100 + diff * 10) * 0.3;
      const MAX_PROGRESS = 100 + diff * 10;
      const stateRef = useRef({ fishY: 50, fishTargetY: 50, fishTimer: 0, barY: 0, barVelocity: 0, isHolding: false, progress: INITIAL_PROGRESS, gameActive: true });
      const barRef = useRef(null); const fishRef = useRef(null); const progressRef = useRef(null);

      useEffect(() => {
        let lastTime;
        const loop = (currentTime) => {
          const state = stateRef.current; if (!state.gameActive) return;
          if (!lastTime) { lastTime = currentTime; requestAnimationFrame(loop); return; }
          const dt = Math.min((currentTime - lastTime) / 1000, 0.05); lastTime = currentTime;
          const acc = 2200; state.barVelocity += (state.isHolding ? acc : -acc) * dt;
          state.barVelocity *= 0.82; state.barY = Math.max(0, Math.min(100 - BAR_HEIGHT, state.barY + state.barVelocity * dt));
          state.fishTimer -= dt;
          if (state.fishTimer <= 0) { state.fishTargetY = Math.random() * 92; state.fishTimer = (0.4 + Math.random() * 1.0) * (isSimple ? 1.25 : 1); }
          const dy = state.fishTargetY - state.fishY;
          state.fishY += Math.sign(dy) * Math.min(Math.abs(dy), (18 + diff * 3.5) * dt * (isSimple ? 0.8 : 1) * weatherSpeedMult);
          const isOverlap = Math.abs((state.fishY + 4) - (state.barY + BAR_HEIGHT / 2)) < (BAR_HEIGHT / 2);
          state.progress += (isOverlap ? (20 * (isSimple ? 1.2 : 1)) : (-10 * (isSimple ? 0.8 : 1))) * dt;
          if (barRef.current) barRef.current.style.bottom = `${state.barY}%`;
          if (fishRef.current) fishRef.current.style.bottom = `${state.fishY}%`;
          if (progressRef.current) progressRef.current.style.height = `${Math.max(0, Math.min(100, (state.progress / MAX_PROGRESS) * 100))}%`;
          if (state.progress >= MAX_PROGRESS) onWin(); else if (state.progress <= 0) onLose(); else requestAnimationFrame(loop);
        };
        requestAnimationFrame(loop);
        return () => { stateRef.current.gameActive = false; SoundEngine.stopReeling(); };
      }, []);

      return (
        <div className="absolute inset-0 flex items-center justify-center bg-black/70 z-50 backdrop-blur-sm p-4">
          <div className="bg-gray-800 p-6 rounded-2xl border-4 border-gray-600 flex flex-col items-center w-full max-w-sm">
            <h3 className="text-xl font-bold mb-4">將魚保持在綠色區塊！</h3>
            <div className="flex gap-8 items-center h-72">
              <div className="relative w-14 h-full bg-blue-950 border-4 border-gray-700 rounded-lg overflow-hidden">
                <div ref={barRef} className="absolute w-full bg-green-500/80 border-y-2 border-green-300" style={{ height: `${BAR_HEIGHT}%`, bottom: '0%' }} />
                <div ref={fishRef} className="absolute w-full flex justify-center text-2xl" style={{ height: '8%', bottom: '50%' }}>{fish.icon}</div>
              </div>
              <div className="w-8 h-full bg-gray-900 border-4 border-gray-700 rounded-lg flex items-end overflow-hidden">
                <div ref={progressRef} className="w-full bg-gradient-to-t from-red-500 via-yellow-500 to-green-500" style={{ height: '30%' }} />
              </div>
            </div>
            <button className="mt-8 w-full py-5 bg-blue-600 active:bg-blue-800 text-white font-bold text-2xl rounded-2xl shadow-[0_6px_0_rgb(30,58,138)] active:translate-y-1"
              onPointerDown={() => { stateRef.current.isHolding = true; SoundEngine.startReeling(); }}
              onPointerUp={() => { stateRef.current.isHolding = false; SoundEngine.stopReeling(); }}
              onPointerLeave={() => { stateRef.current.isHolding = false; SoundEngine.stopReeling(); }}
            >卷線 (按住)</button>
          </div>
        </div>
      );
    };

    // --- 主應用程式 ---
    function App() {
      const [appState, setAppState] = useState('UNLOCK');
      const [posture, setPosture] = useState('standing');
      const [gameState, setGameState] = useState('IDLE');
      const [gameTime, setGameTime] = useState(360);
      const [weather, setWeather] = useState('sunny');
      const [inventory, setInventory] = useState([]);
      const [totalEarned, setTotalEarned] = useState(0);
      const [hookedFish, setHookedFish] = useState(null);
      const [startDiff, setStartDiff] = useState('simple');

      useEffect(() => {
        if (appState !== 'PLAYING') return;
        const timer = setInterval(() => setGameTime(prev => (prev + 1) % 1440), 1000);
        return () => clearInterval(timer);
      }, [appState]);

      const handleUnlock = () => { SoundEngine.init(); SoundEngine.playBGM(); setAppState('START'); };
      const startGame = () => {
        setWeather(['sunny', 'cloudy', 'rainy'][Math.floor(Math.random()*3)]);
        setInventory([]); setTotalEarned(0); setPosture('sitting'); setAppState('PLAYING');
        SoundEngine.stopBGM(); SoundEngine.playSit();
      };

      const castLine = () => {
        setGameState('CASTING'); SoundEngine.playCast();
        setTimeout(() => setGameState('WAITING'), 1000);
        const wait = (1500 + Math.random() * 3000) * (weather === 'rainy' ? 0.5 : 1);
        setTimeout(() => setGameState('BITING'), 1000 + wait);
      };

      const catchFish = () => {
        if (gameState !== 'BITING') return;
        const fish = generateFish(gameTime);
        setHookedFish(fish); setGameState('MINIGAME'); SoundEngine.playHit();
      };

      const onWin = () => {
        setInventory(prev => [hookedFish, ...prev]); setTotalEarned(prev => prev + hookedFish.price);
        setGameState('IDLE'); setHookedFish(null); SoundEngine.playVictory();
      };

      // 動態背景光影遮罩
      const isNight = gameTime < 360 || gameTime > 1080;
      const isCloudy = weather !== 'sunny';

      return (
        <div className="flex flex-col h-screen bg-gray-900 font-sans overflow-hidden select-none relative">
          <style dangerouslySetInnerHTML={{ __html: `
            @keyframes iris-out { 
              0% { clip-path: circle(150% at 50% 86%); } 
              40% { clip-path: circle(18% at 50% 86%); } 
              70% { clip-path: circle(18% at 50% 86%); } 
              100% { clip-path: circle(0% at 50% 86%); } 
            }
            .anim-iris-out { animation: iris-out 4s ease-in-out 3.5s forwards; }
            .anim-walk-away { animation: walk-away 3.5s linear forwards; transform-origin: center; }
            @keyframes walk-away { 0% { transform: translate(400px, 500px); } 100% { transform: translate(400px, 430px); } }
            .anim-line-move { animation: line-move 0.7s linear infinite; }
            @keyframes line-move { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: translateY(120px); opacity: 0; } }
            .anim-bob { animation: bob 0.35s alternate infinite; }
            @keyframes bob { 0% { transform: translateY(0); } 100% { transform: translateY(-4px); } }
            .anim-leg-walk { animation: leg-walk 0.35s alternate infinite; }
            @keyframes leg-walk { 0% { transform: rotate(-25deg); } 100% { transform: rotate(25deg); } }
            .anim-leg-walk-reverse { animation: leg-walk-reverse 0.35s alternate infinite; }
            @keyframes leg-walk-reverse { 0% { transform: rotate(25deg); } 100% { transform: rotate(-25deg); } }
            .anim-text-fade { animation: fade-in 3s ease-in 7s forwards; }
            @keyframes fade-in { 0% { opacity: 0; } 100% { opacity: 1; } }
          ` }} />

          {appState === 'UNLOCK' && <div className="absolute inset-0 z-50 flex items-center justify-center bg-sky-900 cursor-pointer" onClick={handleUnlock}><h2 className="text-2xl font-bold animate-pulse text-white">點擊進入碼頭</h2></div>}
          
          {appState === 'START' && (
            <div className="absolute inset-0 z-40 flex items-center justify-center bg-black/30 backdrop-blur-md">
              <div className="bg-slate-900/90 border-4 border-slate-700 p-8 rounded-3xl flex flex-col items-center max-w-sm w-full">
                <h1 className="text-4xl font-black mb-6 border-b-2 pb-2">海風釣魚</h1>
                <div className="w-full space-y-4 mb-8">
                  <div className="flex gap-2">
                    <button onClick={()=>setStartDiff('simple')} className={`flex-1 py-2 rounded-lg font-bold ${startDiff==='simple'?'bg-green-600':'bg-slate-700 text-gray-400'}`}>簡單</button>
                    <button onClick={()=>setStartDiff('classic')} className={`flex-1 py-2 rounded-lg font-bold ${startDiff==='classic'?'bg-red-600':'bg-slate-700 text-gray-400'}`}>經典</button>
                  </div>
                </div>
                <button onClick={startGame} className="w-full py-4 bg-blue-600 hover:bg-blue-500 font-black text-xl rounded-2xl shadow-lg active:translate-y-1">開始釣魚</button>
              </div>
            </div>
          )}

          {appState === 'PLAYING' && (
            <div className="flex-none h-[60vh] relative overflow-hidden bg-sky-200 border-b-4 border-amber-900">
              {/* 日照調整：大白天純白、陰天輕微對比、夜晚深藍 */}
              <div className="absolute inset-0 z-10 transition-colors duration-1000" style={{ backgroundColor: isNight ? 'rgba(10,10,50,0.7)' : (weather==='sunny'?'rgba(255,255,255,0.1)':'rgba(100,100,120,0.25)') }} />
              
              <svg viewBox="0 0 800 500" preserveAspectRatio="xMidYMax slice" className="w-full h-full">
                <rect width="1000" height="400" fill={weather==='sunny'?'#e0f2fe':'#94a3b8'} />
                <circle cx="150" cy="150" r="60" fill={isNight?'#fdf8ff':'#fef08a'} />
                <rect y="380" width="1000" height="120" fill="#1e3a8a" />
                <rect x="50" y="340" width="200" height="20" fill="#78350f" />
                {isNight && <circle cx="80" cy="320" r="30" fill="#facc15" opacity="0.3" className="animate-pulse" />}
                <g transform="translate(100, 200)">
                  <circle cx="80" cy="35" r="22" fill="#fca5a5" />
                  <rect x="40" y="50" width="55" height="70" fill="#1e3a8a" rx="10" />
                </g>
              </svg>

              {gameState === 'BITING' && <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-6xl animate-bounce">❗</div>}
              {gameState === 'MINIGAME' && <FishingMiniGame fish={hookedFish} difficultySettings={startDiff} weather={weather} onWin={onWin} onLose={()=>setGameState('IDLE')} />}
              
              <div className="absolute top-4 left-4 bg-black/60 px-4 py-2 rounded-full font-mono">🕒 {formatTime(gameTime)}</div>
            </div>
          )}

          {appState === 'PLAYING' && (
            <div className="flex-1 bg-gray-800 p-4 flex flex-col items-center justify-center">
               <button onClick={gameState==='IDLE'?castLine:catchFish} className={`w-64 py-6 rounded-3xl font-black text-3xl shadow-2xl transition-all ${gameState==='BITING'?'bg-red-500 scale-110 animate-pulse':'bg-blue-600'}`}>
                 {gameState==='IDLE'?'拋竿':(gameState==='BITING'?'拉竿！':'等待中...')}
               </button>
               <button onClick={handleGoHome} className="mt-8 text-gray-400 underline">結束釣魚</button>
            </div>
          )}

          {appState === 'SUMMARY' && <SummaryPanel inventory={inventory} totalEarned={totalEarned} onRestart={()=>setAppState('START')} onGoHome={handleGoHome} />}
          {appState === 'ENDING' && <EndingScreen totalEarned={totalEarned} />}
        </div>
      );
    }

    // --- 最後：將 React 掛載到 root 節點 ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
